<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <title>scooby — Python environment detective</title>

  <!-- Cream background -->
  <rect width="1280" height="640" fill="#F5EDD8"/>

  <!-- Subtle decorative paw prints in corners -->
  <g opacity="0.06" fill="#2A1810">
    <g transform="translate(100 110)">
      <ellipse cx="0" cy="10" rx="18" ry="14"/>
      <circle cx="-18" cy="-14" r="8"/>
      <circle cx="-5" cy="-22" r="8"/>
      <circle cx="10" cy="-20" r="8"/>
      <circle cx="22" cy="-8" r="8"/>
    </g>
    <g transform="translate(1180 530)">
      <ellipse cx="0" cy="10" rx="18" ry="14"/>
      <circle cx="-18" cy="-14" r="8"/>
      <circle cx="-5" cy="-22" r="8"/>
      <circle cx="10" cy="-20" r="8"/>
      <circle cx="22" cy="-8" r="8"/>
    </g>
  </g>

  <!-- Icon: magnifying glass + paw, centered top -->
  <g transform="translate(640 180)">
    <!-- Handle (drawn before ring) -->
    <g transform="rotate(-45)">
      <rect x="-20" y="100" width="40" height="120" rx="20" fill="#2A1810"/>
    </g>
    <!-- Ring -->
    <circle cx="0" cy="0" r="100" fill="#F5EDD8" stroke="#2A1810" stroke-width="22"/>
    <!-- Paw -->
    <g fill="#C99A5E">
      <ellipse cx="0" cy="28" rx="33" ry="26"/>
      <ellipse cx="-44" cy="-14" rx="13" ry="19" transform="rotate(-18 -44 -14)"/>
      <ellipse cx="-19" cy="-44" rx="13" ry="19" transform="rotate(-7 -19 -44)"/>
      <ellipse cx="19" cy="-44" rx="13" ry="19" transform="rotate(7 19 -44)"/>
      <ellipse cx="44" cy="-14" rx="13" ry="19" transform="rotate(18 44 -14)"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="640" y="490" text-anchor="middle"
        font-family="Quicksand, 'Nunito', 'Trebuchet MS', 'Helvetica Neue', sans-serif"
        font-size="180" font-weight="800" fill="#2A1810"
        letter-spacing="-4">scooby</text>

  <!-- Tagline -->
  <text x="640" y="555" text-anchor="middle"
        font-family="Quicksand, 'Nunito', 'Trebuchet MS', 'Helvetica Neue', sans-serif"
        font-size="38" font-weight="500" fill="#7A5A3F"
        letter-spacing="3">Python environment detective</text>
</svg>
